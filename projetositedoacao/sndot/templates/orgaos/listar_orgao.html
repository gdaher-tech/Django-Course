<h1>Órgãos Cadastrados</h1>
<a href="{% url 'adicionar_orgao' %}">+ Novo Órgão</a>
<table>
    <tr>
        <th>Nome</th>
        <th>Descrição</th>
        <th>Ações</th>
    </tr>
    {% for orgao in orgaos %}
    <tr>
        <td>{{ orgao.nome }}</td>
        <td>{{ orgao.descricao }}</td>
        <td>
            <a href="{% url 'editar_orgao' orgao.pk %}">Editar</a>
            <a href="{% url 'excluir_orgao' orgao.pk %}">Excluir</a>
        </td>
    </tr>
    {% endfor %}
</table>
